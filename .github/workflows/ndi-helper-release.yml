name: NDI Helper — Release

# 觸發：手動 + tag push (v0.x)
on:
  workflow_dispatch:
  push:
    tags:
      - 'ndi-helper-v*'

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ndi-helper
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ndi-helper

      # turbojpeg 系統套件 — 用 vcpkg
      - name: Setup vcpkg
        uses: johnwason/vcpkg-action@v6
        with:
          pkgs: libjpeg-turbo
          triplet: x64-windows
          token: ${{ github.token }}

      - name: Build release
        run: cargo build --release

      - name: Install cargo-wix
        run: cargo install cargo-wix

      - name: Build MSI
        run: |
          cargo wix init --force
          cargo wix --no-build

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ndi-helper-windows-msi
          path: ndi-helper/target/wix/*.msi

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: ndi-helper-windows-exe
          path: ndi-helper/target/release/stage-previz-ndi-helper.exe

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ndi-helper
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ndi-helper

      - name: Install jpeg-turbo
        run: brew install jpeg-turbo

      - name: Build release
        run: cargo build --release

      - name: Upload macOS binary
        uses: actions/upload-artifact@v4
        with:
          name: ndi-helper-macos
          path: ndi-helper/target/release/stage-previz-ndi-helper

  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ndi-helper
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ndi-helper

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libturbojpeg0-dev libgtk-3-dev libxdo-dev libayatana-appindicator3-dev

      - name: Build release
        run: cargo build --release

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: ndi-helper-linux
          path: ndi-helper/target/release/stage-previz-ndi-helper

  release:
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Make release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/ndi-helper-windows-msi/*.msi
            artifacts/ndi-helper-windows-exe/*.exe
            artifacts/ndi-helper-macos/stage-previz-ndi-helper
            artifacts/ndi-helper-linux/stage-previz-ndi-helper
          generate_release_notes: true
